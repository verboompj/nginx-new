name: Build and Deploy to ACI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  # Azure Container Registry
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}   # e.g. myregistry.azurecr.io
  IMAGE_NAME: nginx-new
  # Azure resource targets
  RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}       # e.g. rg-nginx-new
  CONTAINER_NAME: nginx-new

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Authenticate with Azure ────────────────────────────────────────
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── 3. Build & push image to ACR ──────────────────────────────────────
      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          IMAGE_TAG=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker build -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"
          # Also tag as latest
          LATEST_TAG=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          docker tag "$IMAGE_TAG" "$LATEST_TAG"
          docker push "$LATEST_TAG"

      # ── 4. Deploy to ACI ──────────────────────────────────────────────────
      - name: Deploy to Azure Container Instances
        uses: azure/aci-deploy@v1
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          name: ${{ env.CONTAINER_NAME }}
          image: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          registry-login-server: ${{ env.ACR_LOGIN_SERVER }}
          registry-username: ${{ secrets.ACR_USERNAME }}
          registry-password: ${{ secrets.ACR_PASSWORD }}
          ports: 80
          dns-name-label: ${{ env.CONTAINER_NAME }}
          location: westeurope     # ← change to your preferred region
          os-type: Linux
          cpu: 1
          memory: 1.5
